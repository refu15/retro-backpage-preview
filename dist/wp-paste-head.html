<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  /* ELEGANT WHITE — 上品・明るい・ウェディング寄り（提案01） */
  --bg:#ffffff;
  --bg-2:#fbf8f1;
  --bg-3:#f3ebd7;
  --ink:#2a2218;
  --ink-sub:#4d4032;
  --ink-dim:#786a57;   /* WCAG AA: 4.98:1 on white, 4.72:1 on bg-2 */
  --brass:#b08848;     /* WCAG AA: 3.21:1 on white (large-only), 3.03:1 on bg-2 */
  --brass-soft:#d8b676;
  --brass-deep:#8a6732;
  --line:rgba(178,138,75,.3);
  --line-soft:rgba(178,138,75,.14);
  --serif:"Cormorant Garamond","Shippori Mincho",serif;
  --serif-classic:"Cinzel","Cormorant Garamond",serif;
  --jp:"Shippori Mincho","Noto Serif JP",serif;
  --jp-body:"Noto Serif JP",serif;
  --sans:"Noto Sans JP",sans-serif;
  --shadow:0 22px 44px -22px rgba(76,56,24,.22);
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  font-size:15px;line-height:1.9;
  -webkit-font-smoothing:antialiased;

  padding-bottom:90px;
}
img{display:block;max-width:100%;height:auto}
a{color:inherit;text-decoration:none;transition:.4s}

/* ===== Header ===== */
/* ===== Elegant header (top brass rule / scroll-condensing / drawer nav) ===== */
.site-header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:18px 44px;
  display:flex;align-items:center;justify-content:space-between;gap:20px;
  background:rgba(255,255,255,.93);
  backdrop-filter:blur(14px) saturate(1.15);
  -webkit-backdrop-filter:blur(14px) saturate(1.15);
  border-bottom:1px solid var(--line-soft);
  transition:padding .35s ease, background .35s ease, box-shadow .35s ease;
}
.site-header::before{
  content:"";position:absolute;left:0;right:0;top:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,rgba(176,136,72,.0) 10%,var(--brass-soft) 30%,var(--brass) 50%,var(--brass-soft) 70%,rgba(176,136,72,.0) 90%,transparent 100%);
  opacity:.75;pointer-events:none;
}
.site-header.is-scrolled{
  padding:10px 44px;
  background:rgba(255,255,255,.98);
  box-shadow:0 8px 24px -14px rgba(60,40,20,.2);
}
.site-header .logo{
  font-family:"Cormorant Garamond",serif;
  font-size:clamp(20px,2vw,24px);letter-spacing:.24em;color:var(--ink);
  display:inline-flex;align-items:baseline;gap:.06em;font-weight:500;
  position:relative;padding-left:24px;transition:.3s;
}
.site-header .logo::before{
  content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:8px;height:8px;border:1px solid var(--brass);border-radius:50%;
  background:transparent;transition:.3s;
}
.site-header .logo:hover::before{background:var(--brass);transform:translateY(-50%) scale(1.15)}
.site-header .logo b{font-weight:500;transition:.3s}
.site-header .logo span{font-style:italic;color:var(--brass);opacity:.72}
.site-header nav ul{display:flex;gap:0;list-style:none;align-items:center}
.site-header nav li{position:relative}
.site-header nav li + li::before{
  content:"·";position:absolute;left:-3px;top:50%;transform:translateY(-55%);
  font-family:"Cormorant Garamond",serif;font-size:18px;
  color:var(--brass);opacity:.45;font-style:italic;pointer-events:none;
}
.site-header nav a{
  display:inline-block;
  padding:10px 20px;
  font-family:var(--sans);font-size:11px;letter-spacing:.3em;font-weight:500;
  color:var(--ink-sub);text-transform:uppercase;position:relative;
  transition:color .3s;
}
.site-header nav a::before,
.site-header nav a::after{
  content:"";position:absolute;left:50%;
  height:1px;width:calc(100% - 28px);background:var(--brass);
  transform:translateX(-50%) scaleX(0);transform-origin:center;
  transition:transform .4s cubic-bezier(.2,.7,.2,1);
}
.site-header nav a::before{top:0}
.site-header nav a::after{bottom:0}
.site-header nav a:hover,
.site-header nav a.active{color:var(--brass-deep)}
.site-header nav a:hover::before,
.site-header nav a:hover::after,
.site-header nav a.active::before,
.site-header nav a.active::after{transform:translateX(-50%) scaleX(1)}

.header-tel{
  display:inline-flex;align-items:center;gap:10px;
  padding:11px 22px;position:relative;
  background:linear-gradient(135deg,#c69553 0%,#a06d33 100%);
  color:#fff;white-space:nowrap;transition:.35s;
  font-family:"Cormorant Garamond",serif;font-weight:600;font-size:19px;letter-spacing:.05em;
  box-shadow:0 8px 20px -6px rgba(140,90,40,.4),inset 0 0 0 1px rgba(255,255,255,.12);
  border-radius:2px;
}
.header-tel::before{
  content:"";position:absolute;inset:3px;
  border:1px solid rgba(255,255,255,.32);pointer-events:none;border-radius:1px;
}
.header-tel::after{
  content:"";position:absolute;inset:0;border-radius:2px;
  border:1px solid var(--brass);
  animation:telPulse 3.2s ease-out infinite;pointer-events:none;opacity:0;
}
@keyframes telPulse{
  0%{opacity:.55;transform:scale(1)}
  80%{opacity:0;transform:scale(1.14)}
  100%{opacity:0;transform:scale(1.14)}
}
.header-tel:hover{transform:translateY(-1px);box-shadow:0 14px 28px -6px rgba(140,90,40,.55)}
.header-tel .ic{font-size:14px;color:#fff}
.header-tel small{font-size:9.5px;letter-spacing:.26em;font-family:var(--sans);font-weight:700;color:rgba(255,255,255,.88);margin-right:5px}

.header-burger{
  display:none;
  width:36px;height:36px;border:none;background:transparent;padding:0;cursor:pointer;
  position:relative;order:3;
}
.header-burger span{
  position:absolute;left:6px;right:6px;height:1px;background:var(--ink);
  transition:transform .35s, opacity .25s;
}
.header-burger span:nth-child(1){top:12px}
.header-burger span:nth-child(2){top:18px}
.header-burger span:nth-child(3){top:24px}
.site-header.is-open .header-burger span:nth-child(1){transform:translateY(6px) rotate(45deg)}
.site-header.is-open .header-burger span:nth-child(2){opacity:0}
.site-header.is-open .header-burger span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}

  .site-header{padding:14px 30px}
  .site-header.is-scrolled{padding:9px 30px}
  .site-header nav a{font-size:10.5px;letter-spacing:.26em;padding:8px 14px}

  .header-burger{display:inline-block}
  .site-header nav{

  }
  .site-header.is-open nav{right:0}
  .site-header nav ul{flex-direction:column;gap:0;align-items:stretch}
  .site-header nav li{border-bottom:1px solid var(--line-soft)}
  .site-header nav li + li::before{display:none}
  .site-header nav a{
    padding:18px 2px;font-size:12.5px;letter-spacing:.24em;
    display:flex;justify-content:space-between;align-items:center;width:100%;
  }
  .site-header nav a::before{display:none}
  .site-header nav a::after{
    content:"→";position:static;transform:none;
    width:auto;height:auto;background:transparent;
    color:var(--brass);opacity:.55;letter-spacing:0;font-family:var(--sans);font-size:13px;
  }

}

/* ===== Hero — refined, full-bleed editorial ===== */
.hero{
  position:relative;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  background:#0a0805;
  padding-top:84px;
}
.hero::before{
  /* Aligned with slideshow slide #1 (mv_img01.jpg) + <link rel="preload">
     so the LCP image is fetched once with high priority. */
  content:"";position:absolute;inset:0;
  background:url('https://retro-backpage.com/wp/wp-content/themes/backpage/img/index/mv_img01.jpg') center/cover no-repeat;
  filter:contrast(1.04) saturate(.82) brightness(.52);
  transform:scale(1.02);
  animation:heroDrift 28s ease-in-out infinite alternate;
}
@keyframes heroDrift{from{transform:scale(1.02)}to{transform:scale(1.1)}}
.hero::after{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(ellipse at center,transparent 0%,rgba(10,8,5,.55) 100%),
    linear-gradient(180deg,rgba(10,8,5,.5) 0%,rgba(10,8,5,.2) 35%,rgba(10,8,5,.75) 100%);
}
.hero-frame{
  position:absolute;inset:40px;z-index:1;
  border:1px solid rgba(212,188,140,.25);
  pointer-events:none;
}
@media(max-width:640px){.hero-frame{inset:18px}}
.hero-inner{
  position:relative;z-index:2;
  text-align:center;padding:0 30px;max-width:900px;
}
.hero-estab{
  /* Flex layout keeps the left/right rules + text on a single line and
     shrinks the rules gracefully on narrow viewports. */
  display:flex;align-items:center;justify-content:center;gap:22px;
  font-family:"Jost",sans-serif;
  font-weight:300;font-size:11px;letter-spacing:.62em;
  color:#c9ac75;text-transform:uppercase;

  max-width:100%;white-space:nowrap;
}
.hero-estab::before,.hero-estab::after{
  content:"";display:block;
  flex:0 1 34px;min-width:12px;height:1px;
  background:#c9ac75;opacity:.5;
}
@media(max-width:420px){
  .hero-estab{gap:12px;font-size:10px;letter-spacing:.34em;margin-bottom:36px}

.hero h1,.hero-title{

  font-weight:400;
  font-size:clamp(68px,11vw,176px);
  line-height:.98;letter-spacing:.01em;
  color:#f3e8d4;
  opacity:0;animation:fadeUp 1.6s .5s forwards;
}
.hero h1 .amp,.hero-title i{
  font-family:"Italiana",serif;
  font-weight:400;font-style:normal;

.hero-rule{
  width:42px;height:1px;background:#c9ac75;

}
@keyframes fadeWidth{from{opacity:0;width:0}to{opacity:.6;width:42px}}
.hero .sub,.hero-jp{
  font-family:"Shippori Mincho",serif;
  font-weight:400;
  font-size:12px;letter-spacing:.42em;

  opacity:0;animation:fadeUp 1.4s 1.1s forwards;
}
/* Keep each phrase of hero-jp from breaking in the middle on narrow viewports.
   The whole line breaks only at the em-dash separator, never inside a phrase. */
.hero-jp .nobr{white-space:nowrap;display:inline-block}
.hero-jp .hero-jp-sep{display:inline-block;margin:0 .2em;opacity:.65}
/* Hero pillars — 4本柱の訴求バッジ (夜景 × 本格料理 × ライブ対応 × 120名貸切) */
.hero-pillars{
  list-style:none;padding:0;
  margin:34px auto 0;

.hero-pillars li + li::before{
  content:"";position:absolute;left:-14px;top:50%;transform:translateY(-50%);

}
.hero-pillars .tag{

  font-size:11px;letter-spacing:.32em;

}
.hero-pillars b{
  font-family:"Shippori Mincho",serif;font-weight:500;

  .hero-pillars{
    display:grid;grid-template-columns:repeat(2,minmax(0,1fr));
    gap:18px 24px;margin:24px auto 0;max-width:320px;
  }
  .hero-pillars li{min-width:0;padding:0}
  /* 2x2 grid: separator lines only between columns (odd→even) */
  .hero-pillars li + li::before{display:none}
  .hero-pillars li:nth-child(even)::before{
    content:"";display:block;position:absolute;
    left:-12px;top:50%;transform:translateY(-50%);
    width:1px;height:22px;background:rgba(201,172,117,.5);
  }
  .hero-pillars .tag{font-size:9.5px;letter-spacing:.24em}
  .hero-pillars b{font-size:12.5px;letter-spacing:.05em}
  /* SCROLL indicator collides with pillars on narrow screens */
  .hero-scroll,.hero .scroll{display:none}
}

.hero-scroll,.hero .scroll{
  position:absolute;bottom:50px;left:50%;transform:translateX(-50%);
  font-family:"Jost",sans-serif;font-weight:300;
  font-size:10px;letter-spacing:.5em;color:rgba(201,172,117,.65);
  z-index:3;text-transform:uppercase;
}
.hero-scroll::after,.hero .scroll::after{
  content:"";display:block;width:1px;height:48px;background:#d4bc8c;opacity:.6;
  margin:14px auto 0;animation:scrollLine 2.4s ease-in-out infinite;
  transform-origin:top;
}
@keyframes scrollLine{0%,100%{transform:scaleY(0);opacity:0}50%{transform:scaleY(1);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* ===== Marquee — understated ribbon ===== */
.marquee{
  padding:22px 0;
  border-top:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);
  overflow:hidden;background:var(--bg);
}
.marquee-track{

.marquee-track span::after{

}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ===== LIVE showcase ===== */
.live{background:var(--bg)}

.plan-common-head{

.plan-common-grid > span::before{

}

@media(max-width:500px){.plan-common-grid{grid-template-columns:1fr}}

/* Free rental equipment list (icons) */
.plan-common-sub{
  font-family:var(--jp);font-size:13px;letter-spacing:.12em;
  color:var(--ink);margin:26px 0 14px;padding-top:20px;

  display:flex;align-items:center;gap:10px;
}
.plan-common-sub small{
  font-size:10px;letter-spacing:.2em;color:var(--brass-deep);

}
.plan-common-sub .plan-free-tag{
  margin-left:auto;padding:3px 10px;
  background:var(--brass-deep);color:#fff;
  font-family:var(--serif);font-style:italic;font-size:10.5px;
  letter-spacing:.18em;border-radius:3px;font-weight:500;
}
.plan-equipment-grid{
  list-style:none;padding:0;margin:0;

.plan-equipment-grid li{

.plan-equipment-grid li:hover{
  border-color:var(--brass);transform:translateY(-1px);

}
.plan-equipment-grid .eq-icon{
  flex-shrink:0;width:40px;height:40px;

}
.plan-equipment-grid .eq-icon svg{width:22px;height:22px;display:block}
.plan-equipment-grid .eq-label{

}
.plan-equipment-grid .eq-label small{

@media(max-width:900px){.plan-equipment-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){
  .plan-equipment-grid{grid-template-columns:1fr}
  .plan-common-sub .plan-free-tag{font-size:9.5px;padding:3px 8px}
}

.plan-notes{
  margin-top:22px;font-size:12.5px;color:var(--ink-sub);
  line-height:2;letter-spacing:.03em;padding:0 8px;
}
.plan-notes p{margin:0 0 4px}
.plan-notes b{color:var(--ink);font-weight:600}

/* Individual customer CTA (inside plans section) */
.plan-individual{
  margin:36px 0 0;padding:22px 28px;
  display:flex;align-items:center;justify-content:space-between;gap:24px;
  background:var(--bg-2);border:1px solid var(--line-soft);border-radius:8px;
  position:relative;
}
.plan-individual::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--brass);border-radius:8px 0 0 8px;
}
.plan-individual-text{flex:1;min-width:0}
.plan-individual-text .label{
  display:inline-block;font-family:var(--serif);font-style:italic;
  font-size:11px;letter-spacing:.3em;color:var(--brass-deep);
  margin:0 0 6px;text-transform:uppercase;
}
.plan-individual-text p{
  font-family:var(--jp);font-size:13.5px;color:var(--ink-sub);
  letter-spacing:.04em;line-height:1.75;margin:0;
}
.plan-individual-text p b{color:var(--ink);font-weight:600}
.plan-individual-btn{
  flex-shrink:0;
  display:inline-flex;align-items:center;gap:10px;
  padding:13px 24px;border:1px solid var(--brass);
  background:#fff;color:var(--brass-deep);
  font-family:var(--jp);font-size:12.5px;font-weight:700;letter-spacing:.15em;
  text-decoration:none;transition:.3s;white-space:nowrap;
}
.plan-individual-btn:hover{background:var(--brass-deep);color:#fff}
.plan-individual-btn .arr{font-family:var(--sans);font-size:12px;transition:.3s}
.plan-individual-btn:hover .arr{transform:translateX(4px)}
@media(max-width:700px){
  .plan-individual{flex-direction:column;align-items:stretch;gap:16px;padding:20px 22px}
  .plan-individual-btn{justify-content:center}
}

/* ===== Gallery ===== */
.gallery{background:var(--bg-2);position:relative;overflow:hidden}
.gallery::before{
  content:"GALLERY";position:absolute;right:-20px;top:50px;
  font-family:var(--serif);font-style:italic;font-size:170px;font-weight:500;
  color:transparent;-webkit-text-stroke:1px rgba(168,133,80,.1);
  letter-spacing:.08em;pointer-events:none;white-space:nowrap;
}
.gallery-wrap{max-width:1280px;margin:0 auto;position:relative;z-index:2}
.gallery-filters{
  display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:40px;
}
.gf{
  padding:9px 22px;background:#fff;border:1px solid var(--line);cursor:pointer;
  font-family:var(--serif);font-style:italic;font-size:13px;letter-spacing:.2em;
  color:var(--ink-sub);transition:.3s;
}
.gf:hover{border-color:var(--brass);color:var(--brass-deep)}
.gf.active{background:var(--brass-deep);color:#fff;border-color:var(--brass)}

.gallery-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  grid-auto-rows:180px;gap:14px;
}
.gi{
  position:relative;overflow:hidden;cursor:pointer;
  border:1px solid var(--line);background:#fff;
  transition:.5s;
}
.gi img{
  width:100%;height:100%;object-fit:cover;
  transition:1s cubic-bezier(.2,.8,.2,1);
  filter:saturate(.9);
}
.gi:hover img{transform:scale(1.08);filter:saturate(1)}
.gi::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 50%,rgba(42,34,24,.7));
  opacity:0;transition:.4s;
}
.gi:hover::after{opacity:1}
.gi figcaption{
  position:absolute;left:16px;bottom:14px;right:16px;z-index:2;
  font-family:var(--serif);font-style:italic;font-size:14px;letter-spacing:.2em;
  color:#fff;opacity:0;transform:translateY(8px);transition:.4s;
}
.gi:hover figcaption{opacity:1;transform:translateY(0)}
.gi .gi-cat{
  position:absolute;top:12px;left:12px;z-index:2;
  font-family:var(--serif);font-style:italic;font-size:10px;letter-spacing:.25em;
  padding:3px 10px;background:rgba(255,253,248,.92);color:var(--brass-deep);
  border:1px solid var(--brass);
}
.gi.hide{display:none}
.gi.tall{grid-row:span 2}
.gi.wide{grid-column:span 2}
@media(max-width:896px){
  .gallery-grid{grid-template-columns:repeat(2,1fr);grid-auto-rows:140px;gap:8px}
  .gi.wide{grid-column:span 2}
  .gi.tall{grid-row:span 2}
  .gallery::before{font-size:90px;top:30px}
}

/* Lightbox */
.lightbox{
  position:fixed;inset:0;z-index:1000;
  background:rgba(20,15,8,.92);
  display:none;align-items:center;justify-content:center;padding:40px;
  backdrop-filter:blur(8px);
}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:82vh;object-fit:contain;border:1px solid var(--brass);box-shadow:0 30px 80px rgba(0,0,0,.5)}
.lightbox .lb-close{
  position:absolute;top:24px;right:28px;
  width:44px;height:44px;border-radius:50%;
  background:#fff;border:1px solid var(--brass);cursor:pointer;
  font-family:var(--serif);font-size:22px;color:var(--ink);
  transition:.3s;
}
.lightbox .lb-close:hover{background:var(--brass-deep);color:#fff}
.lightbox .lb-caption{
  position:absolute;left:0;right:0;bottom:30px;text-align:center;
  font-family:var(--serif);font-style:italic;font-size:14px;letter-spacing:.25em;
  color:#eee8dc;
}
.lightbox .lb-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:48px;height:48px;border-radius:50%;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.4);
  color:#fff;font-family:var(--serif);font-size:22px;cursor:pointer;
  transition:.3s;
}
.lightbox .lb-nav:hover{background:var(--brass);border-color:var(--brass)}
.lightbox .lb-prev{left:30px}
.lightbox .lb-next{right:30px}
@media(max-width:640px){
  .lightbox{padding:20px}
  .lightbox .lb-close{top:14px;right:14px;width:38px;height:38px;font-size:18px}
  .lightbox .lb-nav{width:40px;height:40px;font-size:18px}
  .lightbox .lb-prev{left:10px}.lightbox .lb-next{right:10px}
  .lightbox .lb-caption{font-size:12px;bottom:14px}
}

/* ===== Corporate Charter ===== */
.corp{background:var(--bg-2);position:relative;overflow:hidden}
.corp::before{
  content:"CORPORATE";position:absolute;left:50%;top:40px;transform:translateX(-50%);
  font-family:var(--serif);font-style:italic;font-size:170px;font-weight:500;
  color:transparent;-webkit-text-stroke:1px rgba(168,133,80,.12);
  letter-spacing:.08em;pointer-events:none;white-space:nowrap;
}
.corp-wrap{max-width:1280px;margin:0 auto;position:relative;z-index:2}
.corp-intro{text-align:center;margin-bottom:72px}
.corp-intro .label{
  font-family:var(--serif);font-style:italic;font-size:16px;letter-spacing:.3em;
  color:var(--brass);margin-bottom:22px;display:inline-flex;align-items:center;gap:16px;
}
.corp-intro .label::before,.corp-intro .label::after{content:"";width:36px;height:1px;background:var(--brass)}
.corp-intro h2{

}
.corp-intro h2 i{font-style:italic;color:inherit}

/* Benefits */
.corp-benefits{

}
.corp-benefits li{
  list-style:none;padding:32px 22px;text-align:center;
  border:1px solid var(--line);background:#fff;

}
.corp-benefits li:hover{border-color:var(--brass);transform:translateY(-4px);box-shadow:var(--shadow)}
.corp-benefits .num{

}
.corp-benefits .tt{font-family:var(--jp);font-size:16px;font-weight:700;color:var(--ink);margin-bottom:10px;display:block}

@media(max-width:896px){.corp-benefits{grid-template-columns:1fr 1fr;gap:12px}}

/* Flow */
.flow{margin-bottom:90px}
.flow-head{
  font-family:var(--serif);font-style:italic;font-size:24px;color:var(--brass);
  letter-spacing:.2em;text-align:center;margin-bottom:46px;
}
.flow-head::after{content:"";display:block;width:60px;height:1px;background:var(--brass);margin:14px auto 0}
.flow-steps{
  display:grid;grid-template-columns:repeat(4,1fr);gap:20px;position:relative;
}
.flow-steps::before{

.flow-step{position:relative;text-align:center;padding:0 10px}

  margin:0 auto 22px;position:relative;z-index:2;
}
.flow-step h5{font-family:var(--jp);font-size:16px;font-weight:700;margin-bottom:10px;letter-spacing:.1em;color:var(--ink)}
.flow-step p{font-size:12px;color:var(--ink-sub);line-height:1.9}
@media(max-width:896px){
  .flow-steps{grid-template-columns:1fr 1fr;gap:26px}

/* Calendar */
.cal-wrap{
  display:grid;grid-template-columns:1.4fr 1fr;gap:50px;align-items:flex-start;
}
@media(max-width:896px){.cal-wrap{grid-template-columns:1fr;gap:40px}}
.cal-box{
  border:1px solid var(--line);background:#fff;
  padding:40px;
}
.cal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding-bottom:22px;margin-bottom:22px;border-bottom:1px solid var(--line);
}
.cal-head .month{
  font-family:var(--serif);font-style:italic;font-size:34px;color:var(--ink);font-weight:500;
}
.cal-head .month small{font-style:normal;font-size:14px;color:var(--ink-dim);letter-spacing:.2em;margin-left:12px}
.cal-nav{display:flex;gap:8px}
.cal-nav button{
  width:34px;height:34px;border:1px solid var(--line);background:transparent;color:var(--brass-deep);
  cursor:pointer;font-family:var(--serif);font-size:16px;transition:.3s;
}
.cal-nav button:hover{border-color:var(--brass);background:rgba(168,133,80,.08)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-grid .dow{
  font-family:var(--serif);font-style:italic;font-size:12px;letter-spacing:.15em;
  text-align:center;padding:8px 0;color:var(--ink-dim);
}
.cal-grid .dow.sun{color:#c97070}
.cal-grid .dow.sat{color:#6f94c0}
.cal-cell{
  aspect-ratio:1;border:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  font-size:13px;position:relative;transition:.3s;background:var(--bg-2);
}
.cal-cell .d{font-family:var(--serif);font-size:14px;color:var(--ink)}
.cal-cell .st{font-size:16px;line-height:1;font-weight:700}
.cal-cell.empty{border:none;background:transparent}
.cal-cell.past{opacity:.35;pointer-events:none}
.cal-cell.closed{background:rgba(168,133,80,.06)}
.cal-cell.closed .st{font-size:10px;color:var(--ink-dim);font-weight:400;letter-spacing:.1em}
.cal-cell.avail{cursor:pointer;background:#fff}
.cal-cell.avail:hover{border-color:var(--brass);background:rgba(168,133,80,.1);transform:scale(1.05)}
.cal-cell .st.ok{color:#5b9456}
.cal-cell .st.few{color:#b08840}
.cal-cell .st.ask{color:#8c6d3d}
.cal-cell .st.full{color:#a84f4f}
.cal-cell.today{border-color:var(--brass);box-shadow:inset 0 0 0 1px var(--brass)}
.cal-legend{
  display:flex;flex-wrap:wrap;gap:18px;margin-top:22px;padding-top:18px;
  border-top:1px solid var(--line);font-size:12px;color:var(--ink-sub);
}
.cal-legend span{display:inline-flex;align-items:center;gap:6px}
.cal-legend b{font-size:16px;font-weight:700}
.cal-legend b.ok{color:#5b9456}
.cal-legend b.few{color:#b08840}
.cal-legend b.ask{color:#8c6d3d}
.cal-legend b.full{color:#a84f4f}

/* Google Calendar embed (test) */
.cal-embed{
  position:relative;width:100%;background:#fff;
  border:1px solid var(--line-soft);overflow:hidden;
}
.cal-embed iframe{width:100%;height:620px;border:0;display:block}
.cal-embed-note{

/* Contact dual card (phone + mail) */
.contact-dual{display:flex;flex-direction:column;gap:18px}

.tel-card{
  background:linear-gradient(165deg,#c69553 0%,#8c5d2b 100%);

  box-shadow:0 20px 50px -15px rgba(140,90,40,.5);
  color:#fff;
}
.tel-card::before{
  content:"";position:absolute;right:-60px;top:-60px;width:200px;height:200px;
  background:radial-gradient(circle,rgba(255,255,255,.18),transparent 70%);
}
.tel-card::after{
  content:"RECOMMENDED";position:absolute;top:14px;right:16px;z-index:3;
  font-family:var(--serif);font-style:italic;font-size:10px;letter-spacing:.3em;
  color:#fff;padding:3px 8px;border:1px solid rgba(255,255,255,.55);
  background:rgba(0,0,0,.12);
}
.tel-card .tel-icon{
  width:56px;height:56px;border-radius:14px;background:#fff;

.tel-card .tel-icon::after{

.tel-card h4{

}
.tel-card h4 em{font-style:normal;background:rgba(0,0,0,.18);padding:2px 10px;border-radius:4px;font-size:.85em}
.tel-card .tel-lead{font-size:12px;color:rgba(255,255,255,.9);letter-spacing:.08em;margin-bottom:14px;position:relative;z-index:2}
.tel-card .tel-num{
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:var(--serif);font-weight:700;font-size:34px;letter-spacing:.02em;
  color:#fff;padding:18px;margin:4px 0 14px;position:relative;z-index:2;line-height:1.1;
  background:#fff;color:var(--brass-deep);
  box-shadow:0 10px 20px rgba(0,0,0,.15);transition:.3s;
}
.tel-card .tel-num::before{content:"☎";font-size:.75em;color:var(--brass-deep)}
.tel-card .tel-num:hover{transform:translateY(-2px);box-shadow:0 16px 30px rgba(0,0,0,.25);color:#6d4a1a}
.tel-card .tel-hours{font-size:11px;color:rgba(255,255,255,.85);letter-spacing:.1em;position:relative;z-index:2;text-align:center}
.tel-card .tel-bullets{

}
.tel-card .tel-bullets li{
  font-size:11px;color:rgba(255,255,255,.92);letter-spacing:.04em;line-height:1.5;
  padding:6px 8px;background:rgba(255,255,255,.1);border-left:2px solid rgba(255,255,255,.5);
}

.mail-card{

}
.mail-card::before{

  background:radial-gradient(circle,rgba(255,255,255,.15),transparent 70%);
}

  font-family:var(--serif);font-weight:700;font-size:20px;color:var(--brass-deep);
  box-shadow:0 8px 20px rgba(0,0,0,.2);position:relative;z-index:2;
}
.mail-card h4{
  font-family:var(--jp);font-size:19px;font-weight:700;letter-spacing:.08em;
  color:#fff;margin-bottom:12px;line-height:1.5;position:relative;z-index:2;
}
.mail-card h4 em{font-style:normal;color:#fff;background:rgba(0,0,0,.15);padding:2px 10px;border-radius:4px;font-size:.85em}

.mail-btn{

.mail-btn .plus{

/* ===== Estimator ===== */
.estimator{
  margin:0 0 100px;border:1px solid var(--line);background:#fff;padding:56px;
  box-shadow:var(--shadow);
}
.est-head{text-align:center;margin-bottom:42px}
.est-head .label{
  font-family:var(--serif);font-style:italic;font-size:14px;letter-spacing:.3em;
  color:var(--brass);margin-bottom:14px;display:inline-flex;align-items:center;gap:16px;
}
.est-head .label::before,.est-head .label::after{content:"";width:36px;height:1px;background:var(--brass)}
.est-head h3{
  font-family:var(--jp);font-size:clamp(24px,3.2vw,34px);font-weight:700;letter-spacing:.1em;
  margin-bottom:18px;color:var(--ink);
}
.est-head .sub{
  font-size:13px;color:var(--ink-sub);line-height:2;max-width:680px;margin:0 auto;
  padding:16px 24px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);
}
.est-head .sub b{color:var(--brass-deep);font-weight:700}
.est-wrap{display:grid;grid-template-columns:1fr 1.15fr;gap:46px}
@media(max-width:896px){
  .estimator{padding:26px 16px}
  .est-wrap{grid-template-columns:1fr;gap:30px}
}
.est-form .field{margin-bottom:26px}
.est-form .field > label{
  display:block;font-family:var(--jp);font-size:12px;font-weight:700;letter-spacing:.2em;
  color:var(--ink);margin-bottom:12px;
}
.est-form .field > label strong{
  float:right;color:var(--brass-deep);font-size:18px;font-family:var(--serif);font-style:italic;font-weight:600;
}
/* Headcount picker */
.pc-picker{
  padding:22px 22px 18px;background:var(--bg-2);
  border:1px solid var(--line);
}
.pc-display{
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  margin-bottom:20px;
}
.pc-big{
  display:flex;align-items:baseline;gap:2px;
}
.pc-big .n{
  font-family:var(--serif);font-weight:600;font-size:52px;line-height:1;
  color:var(--brass-deep);letter-spacing:.02em;
  transition:.2s;
}
.pc-big.bump .n{transform:scale(1.08)}
.pc-big .u{
  font-family:var(--jp);font-size:16px;color:var(--ink);font-weight:700;margin-left:4px;
}
.pc-step{display:flex;gap:8px}
.pc-step button{
  width:42px;height:42px;border:1px solid var(--brass);background:#fff;
  font-family:var(--serif);font-size:22px;color:var(--brass-deep);cursor:pointer;
  transition:.2s;font-weight:500;
}
.pc-step button:hover:not(:disabled){background:var(--brass-deep);color:#fff}
.pc-step button:disabled{opacity:.3;cursor:not-allowed}

.pc-slider{
  position:relative;padding:12px 0 6px;
}
.pc-slider-track{
  position:absolute;left:0;right:0;top:50%;height:6px;
  background:#fff;border:1px solid var(--line);border-radius:3px;
  transform:translateY(-50%);overflow:hidden;
}
.pc-slider-fill{
  position:absolute;left:0;top:0;bottom:0;
  background:linear-gradient(90deg,var(--brass-soft),var(--brass));
  width:14%;transition:.2s;
}
.est-form input[type=range]{
  width:100%;-webkit-appearance:none;appearance:none;background:transparent;
  margin:0;position:relative;z-index:2;height:28px;cursor:pointer;
}
.est-form input[type=range]::-webkit-slider-runnable-track{height:28px;background:transparent}
.est-form input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:28px;height:28px;border-radius:50%;
  background:var(--brass);border:4px solid #fff;cursor:grab;
  box-shadow:0 0 0 1px var(--brass),0 4px 12px rgba(140,109,61,.4);
  transition:.2s;
}
.est-form input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.1);box-shadow:0 0 0 1px var(--brass),0 6px 18px rgba(140,109,61,.6)}
.est-form input[type=range]::-webkit-slider-thumb:active{cursor:grabbing}
.est-form input[type=range]::-moz-range-track{height:28px;background:transparent}
.est-form input[type=range]::-moz-range-thumb{
  width:28px;height:28px;border-radius:50%;
  background:var(--brass);border:4px solid #fff;cursor:grab;
  box-shadow:0 0 0 1px var(--brass),0 4px 12px rgba(140,109,61,.4);
}

.pc-ticks{
  display:grid;grid-template-columns:repeat(8,1fr);
  margin:14px 0 0;gap:0;position:relative;
}
.pc-ticks > span{
  text-align:center;font-family:var(--serif);font-style:italic;
  font-size:11px;color:var(--ink-dim);letter-spacing:.05em;
  position:relative;padding-top:10px;cursor:pointer;transition:.2s;
}
.pc-ticks > span::before{
  content:"";position:absolute;top:-4px;left:50%;transform:translateX(-50%);
  width:1px;height:8px;background:var(--line);
}
.pc-ticks > span:hover{color:var(--brass-deep)}
.pc-ticks > span.on{color:var(--brass-deep);font-weight:700}
.pc-ticks > span.on::before{background:var(--brass);height:12px;top:-6px}

.pc-caption{
  margin-top:14px;padding:10px 12px;background:#fff;border-left:2px solid var(--brass);
  font-size:11px;color:var(--ink-sub);letter-spacing:.06em;line-height:1.7;
}
.pc-caption b{color:var(--brass-deep)}
.pill-group{display:flex;flex-wrap:wrap;gap:8px}
.pill{cursor:pointer;position:relative}
.pill input{position:absolute;opacity:0;pointer-events:none}
.pill > span{
  display:inline-flex;align-items:center;gap:8px;padding:10px 16px;
  border:1px solid var(--line);font-size:12px;color:var(--ink-sub);
  letter-spacing:.05em;transition:.3s;background:var(--bg-2);
}
.pill > span small{font-family:var(--serif);font-style:italic;color:var(--brass);font-size:11px}
.pill:hover > span{border-color:var(--brass);color:var(--ink)}
.pill input:checked + span{background:var(--brass-deep);color:#fff;border-color:var(--brass);font-weight:700}
.pill input:checked + span small{color:#fff}
.est-btn{
  width:100%;margin-top:6px;padding:18px;background:var(--brass-deep);color:#fff;
  border:none;cursor:pointer;font-family:var(--jp);font-size:14px;font-weight:700;
  letter-spacing:.2em;transition:.3s;
}
.est-btn:hover{background:var(--brass-deep)}
.est-output{background:var(--bg-2);border:1px solid var(--line);padding:30px;min-height:440px}
.est-placeholder{
  height:100%;min-height:380px;display:flex;align-items:center;justify-content:center;
  text-align:center;font-size:13px;color:var(--ink-dim);line-height:1.9;
}
.est-placeholder > span{display:block;font-family:var(--serif);font-style:italic;font-size:18px;color:var(--brass);margin-bottom:10px}

/* Quote document */
.quote-doc{font-size:12px;color:var(--ink)}
.quote-header{
  display:flex;justify-content:space-between;align-items:flex-start;gap:20px;
  padding-bottom:18px;border-bottom:2px solid var(--brass);margin-bottom:20px;
}
.quote-header h4{
  font-family:var(--jp);font-size:22px;font-weight:700;letter-spacing:.3em;
  color:var(--ink);margin-bottom:8px;
}
.quote-header .to{font-size:12px;color:var(--ink-dim)}
.quote-meta{text-align:right;font-size:11px;color:var(--ink-dim);line-height:1.9}
.quote-meta .no{font-family:var(--serif);font-style:italic;color:var(--brass-deep);font-size:13px}
.quote-total-band{
  display:flex;justify-content:space-between;align-items:center;gap:12px;
  padding:18px 22px;background:rgba(168,133,80,.1);
  border-left:3px solid var(--brass);margin-bottom:20px;
}
.quote-total-band .lb{font-size:11px;color:var(--ink-sub);letter-spacing:.25em}
.quote-total-band .big{font-family:var(--serif);font-size:30px;font-weight:700;color:var(--brass-deep)}
.quote-total-band .big small{font-size:11px;color:var(--ink-dim);margin-left:6px;font-weight:400}
.quote-table{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:12px}
.quote-table th{
  font-family:var(--jp);font-weight:700;padding:10px 12px;
  background:rgba(168,133,80,.08);border-bottom:1px solid var(--line);
  font-size:11px;letter-spacing:.1em;color:var(--brass-deep);text-align:left;
}
.quote-table th:nth-child(2),.quote-table th:nth-child(3),.quote-table th:nth-child(4){text-align:right}
.quote-table td{padding:11px 12px;border-bottom:1px dashed var(--line);color:var(--ink)}
.quote-table td:nth-child(2),.quote-table td:nth-child(3),.quote-table td:nth-child(4){
  text-align:right;font-family:var(--serif);font-size:13px;
}
.quote-table td.free{color:#5b9456;font-style:italic}
.quote-table tfoot td{padding:10px 12px;font-weight:700;border-bottom:none}
.quote-table tfoot tr.sub td{color:var(--ink-dim);font-weight:400}
.quote-table tfoot tr.tot td{
  border-top:2px solid var(--brass);padding-top:16px;color:var(--brass-deep);font-size:15px;
}
.quote-footer{
  margin-top:14px;padding-top:16px;border-top:1px solid var(--line);
  font-size:11px;color:var(--ink-sub);line-height:1.9;
}
.quote-footer .note{margin-bottom:16px}
.quote-footer .note b{color:var(--brass-deep)}
.print-btn{
  display:inline-flex;align-items:center;gap:10px;padding:12px 24px;
  background:transparent;color:var(--brass-deep);border:1px solid var(--brass);
  font-family:var(--jp);font-size:12px;font-weight:700;letter-spacing:.15em;
  cursor:pointer;transition:.3s;
}
.print-btn:hover{background:var(--brass-deep);color:#fff}

@media print{
  @page{size:A4;margin:12mm}
  html,body{background:#fff !important;color:#000 !important;margin:0 !important;padding:0 !important}
  /* Hide the entire page; only the JS-injected print clone is shown. */
  body > *{display:none !important}
  body > .quote-doc-print{
    display:block !important;
    position:static !important;
    width:100% !important;padding:0 !important;margin:0 !important;
    background:#fff !important;color:#000 !important;font-size:10pt;
    page-break-inside:avoid;break-inside:avoid;
  }
  .quote-doc-print *{color:#000 !important;background:transparent !important;border-color:#666 !important;page-break-inside:avoid;break-inside:avoid}
  .quote-doc-print .quote-header{border-bottom:2px solid #000 !important;margin-bottom:10px !important;padding-bottom:8px !important}
  .quote-doc-print .quote-header h4{font-size:18px !important;margin:0 0 4px !important}
  .quote-doc-print .quote-total-band{border-left:4px solid #000 !important;background:#f5f5f5 !important;padding:10px 14px !important;margin:0 0 12px !important}
  .quote-doc-print .quote-total-band .big{font-size:22px !important}
  .quote-doc-print .quote-table{margin-bottom:10px !important;font-size:10pt !important}
  .quote-doc-print .quote-table th,.quote-doc-print .quote-table td{padding:6px 8px !important}
  .quote-doc-print .quote-table tfoot tr.tot td{border-top:2px solid #000 !important}
  .quote-doc-print .quote-table td.free{color:#2a6a24 !important}
  .quote-doc-print .quote-footer{margin-top:8px !important}
  .quote-doc-print .quote-footer .note{font-size:9pt !important;margin:0 !important}
  .quote-doc-print .print-btn{display:none !important}
}

/* ===== Info CTA band ===== */
.info{
  padding:100px 40px;
  background:var(--bg-3);
  text-align:center;position:relative;
  border-top:1px solid var(--line);border-bottom:1px solid var(--line);
}
.info .label{
  font-family:var(--serif);font-style:italic;font-size:16px;letter-spacing:.3em;
  color:var(--brass);margin-bottom:22px;
}
.info h3{
  font-family:var(--serif);font-size:clamp(38px,5.5vw,76px);font-weight:500;
  line-height:1.05;margin-bottom:28px;color:var(--ink);
}
.info h3 i{font-style:italic;color:inherit}
.info p{max-width:640px;margin:0 auto 40px;color:var(--ink-sub);font-size:15px;line-height:2.1}
.cta-group{display:flex;gap:18px;justify-content:center;flex-wrap:wrap}
.btn{
  display:inline-flex;align-items:center;gap:14px;
  padding:18px 40px;
  font-family:var(--serif);font-style:italic;font-size:15px;letter-spacing:.25em;
  border:1px solid var(--brass);color:var(--ink);background:#fff;
  transition:.4s;position:relative;overflow:hidden;
}
.btn::before{
  content:"";position:absolute;inset:0;background:var(--brass);
  transform:translateY(101%);transition:.5s;z-index:-1;
}
.btn:hover{color:#fff}
.btn:hover::before{transform:translateY(0)}
.btn .arrow{font-family:var(--sans);font-size:14px}
.btn.primary{background:var(--brass-deep);color:#fff}
.btn.primary::before{background:var(--brass-deep)}
.btn.primary:hover{color:#fff}

/* Big phone display in info section */
.phone-big{
  max-width:560px;margin:30px auto 34px;
  padding:30px 40px;background:#fff;
  border:1px solid var(--brass);
  text-align:center;position:relative;
}
.phone-big::before,.phone-big::after{
  content:"";position:absolute;left:50%;transform:translateX(-50%);
  width:40px;height:1px;background:var(--brass);
}
.phone-big::before{top:-1px}.phone-big::after{bottom:-1px}
.phone-big .plabel{
  font-family:var(--serif);font-style:italic;font-size:13px;letter-spacing:.3em;
  color:var(--brass);margin-bottom:10px;
}
.phone-big .num{
  display:block;
  font-family:var(--serif);font-weight:600;
  font-size:clamp(32px,7vw,60px);letter-spacing:.04em;line-height:1;
  color:var(--ink);margin-bottom:12px;transition:.3s;
}
.phone-big .num:hover{color:var(--brass-deep)}
.phone-big .num::before{content:"☎ ";font-size:.7em;color:var(--brass);margin-right:.2em}
.phone-big .hours{font-size:11px;color:var(--ink-dim);letter-spacing:.18em}

/* ===== Footer ===== */
.site-footer{
  padding:80px 40px 40px;background:#fff;border-top:1px solid var(--line);
}
.footer-grid{
  max-width:1280px;margin:0 auto;
  display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:60px;
}
.footer-grid .brand .logo{
  font-family:var(--serif);font-size:26px;letter-spacing:.2em;color:var(--ink);
  margin-bottom:20px;display:block;font-weight:500;
}
.footer-grid .brand p{font-size:13px;color:var(--ink-sub);line-height:2}
.footer-grid h5{
  font-family:var(--serif);font-style:italic;font-size:14px;letter-spacing:.25em;
  color:var(--brass);margin-bottom:18px;
}
.footer-grid ul{list-style:none}
.footer-grid ul li{margin-bottom:10px;font-size:13px}
.footer-grid ul a{color:var(--ink-sub)}
.footer-grid ul a:hover{color:var(--brass-deep)}
.copy{
  max-width:1280px;margin:50px auto 0;padding-top:26px;
  border-top:1px solid var(--line);
  display:flex;justify-content:space-between;font-size:11px;letter-spacing:.2em;
  color:var(--ink-dim);
}
@media(max-width:896px){
  .section{padding:70px 18px}
  .intro{padding:100px 20px 40px}
  .footer-grid{grid-template-columns:1fr;gap:36px}
  .copy{flex-direction:column;gap:10px;text-align:center}
}

/* ===== Floating dual CTA (Phone + Mail) ===== */
.float-cta{
  position:fixed;right:20px;bottom:20px;z-index:999;
  display:flex;flex-direction:column;gap:12px;
  align-items:flex-end;pointer-events:none;
}
.float-cta > a{pointer-events:auto}
.float-tel{
  display:inline-flex;align-items:center;gap:12px;
  padding:14px 22px;
  background:linear-gradient(135deg,#c69553 0%,#8c5d2b 100%);
  color:#fff;
  font-family:var(--jp);font-weight:700;font-size:14px;letter-spacing:.06em;
  border-radius:50px;
  box-shadow:0 14px 34px -10px rgba(140,90,40,.6),0 0 0 1px rgba(255,255,255,.1);
  transition:.3s;position:relative;
}
.float-tel::after{
  content:"";position:absolute;inset:0;border-radius:50px;
  border:2px solid var(--brass);animation:floatPulse 2.4s ease-out infinite;pointer-events:none;
}
.float-tel:hover{transform:translateY(-3px);box-shadow:0 20px 50px -10px rgba(140,90,40,.8)}
.float-tel .ic{
  width:30px;height:30px;background:#fff;color:var(--brass-deep);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;
  font-weight:700;
}
.float-tel .txt{display:flex;flex-direction:column;line-height:1.2;text-align:left}
.float-tel .txt small{font-size:9px;letter-spacing:.15em;opacity:.9;font-weight:500;margin-bottom:2px}
.float-tel .txt b{font-family:var(--serif);font-weight:700;letter-spacing:.02em;font-size:15px}

.float-mail{
  display:inline-flex;align-items:center;gap:12px;
  padding:14px 22px;
  background:linear-gradient(165deg,#c69553 0%,#8a6732 100%);
  color:#fff;font-family:var(--jp);font-weight:700;font-size:14px;letter-spacing:.06em;
  border-radius:50px;
  box-shadow:0 14px 34px -10px rgba(138,103,50,.55),0 0 0 1px rgba(255,255,255,.1);
  transition:.3s;position:relative;
}
.float-mail::after{
  content:"";position:absolute;inset:0;border-radius:50px;
  border:2px solid #c69553;animation:floatPulse 2.4s ease-out infinite;pointer-events:none;
}
@keyframes floatPulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.15);opacity:0}}
.float-mail:hover{transform:translateY(-3px);box-shadow:0 20px 50px -10px rgba(138,103,50,.75)}
.float-mail .ic{
  width:30px;height:30px;background:#fff;color:var(--brass-deep);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-weight:700;font-size:14px;flex-shrink:0;
}
.float-mail .txt{display:flex;flex-direction:column;line-height:1.2;text-align:left}
.float-mail .txt small{font-size:9px;letter-spacing:.15em;opacity:.85;font-weight:500;margin-bottom:2px}

  .site-header{padding:10px 14px}
  .site-header .logo{font-size:15px;letter-spacing:.12em}

  .marquee{padding:18px 0}

  .intro{padding:80px 16px 30px}

  .party-visual .stack-tl{width:36%;left:-8px;top:-8px}

  /* Compact flow on mobile: single row of 4, small circles, no descriptions */

  .flow-head::after{margin-top:10px;width:40px}
  .flow-steps{grid-template-columns:repeat(4,1fr) !important;gap:6px;position:relative}
  .flow-steps::before{

  }
  .flow-step{padding:0 2px}
  .flow-step .circle{width:38px;height:38px;font-size:12px;margin:0 auto 8px;border-width:1px}
  .flow-step h5{font-size:11px;letter-spacing:.02em;margin-bottom:0;line-height:1.3;font-weight:600}
